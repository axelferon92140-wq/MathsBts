<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MathMagique</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#F8F5FF;
--primary:#6C63FF;
--secondary:#FF6584;
--card:#fff;
--text:#333;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Nunito',sans-serif;
background:var(--bg);
color:var(--text);
padding:15px;
}

header{
text-align:center;
font-size:1.6rem;
margin-bottom:15px;
color:var(--primary);
font-weight:bold;
}

.nav{
display:flex;
gap:10px;
margin-bottom:15px;
}

.nav button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:var(--primary);
color:white;
font-size:0.9rem;
}

.section{display:none;}

.active{display:block;}

.card{
background:var(--card);
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

h2{margin-bottom:10px;}

button{
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:var(--secondary);
color:white;
width:100%;
font-size:1rem;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

.result{
margin-top:10px;
font-weight:bold;
text-align:center;
}

.score{
text-align:center;
font-size:1.2rem;
margin-top:10px;
}

</style>
</head>

<body>

<header>✨ MathMagique</header>

<div class="nav">
<button onclick="show('cours')">Cours</button>
<button onclick="show('quiz')">Quiz</button>
<button onclick="show('jeu')">Jeu</button>
</div>

<!-- COURS -->
<div id="cours" class="section active">

<div class="card">
<h2>Addition</h2>
<p>Pour additionner, on ajoute les nombres.</p>
<p><b>Ex :</b> 2 + 3 = 5</p>
</div>

<div class="card">
<h2>Multiplication</h2>
<p>Multiplier = répéter une addition.</p>
<p><b>Ex :</b> 3 × 4 = 12</p>
</div>

<div class="card">
<h2>Carré</h2>
<p>Un nombre au carré = nombre × lui-même</p>
<p><b>Ex :</b> 5² = 25</p>
</div>

</div>

<!-- QUIZ -->
<div id="quiz" class="section">

<div class="card">
<h2 id="question">Question</h2>
<input type="number" id="reponse" placeholder="Ta réponse">
<button onclick="verifier()">Valider</button>
<div class="result" id="feedback"></div>
<div class="score" id="score">Score : 0</div>
</div>

</div>

<!-- JEU -->
<div id="jeu" class="section">

<div class="card">
<h2>Calcul rapide</h2>
<p id="jeuQuestion"></p>
<input type="number" id="jeuRep">
<button onclick="jeuCheck()">OK</button>
<div class="score" id="jeuScore">Score : 0</div>
</div>

</div>

<script>

// NAVIGATION
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// QUIZ
let score=0;
let a,b,op,rep;

function newQuestion(){
a=Math.floor(Math.random()*10);
b=Math.floor(Math.random()*10);

if(Math.random()>0.5){
op="+";
rep=a+b;
}else{
op="×";
rep=a*b;
}

document.getElementById('question').innerText=`${a} ${op} ${b} = ?`;
document.getElementById('reponse').value="";
}

function verifier(){
let user=parseInt(document.getElementById('reponse').value);

if(user===rep){
score++;
document.getElementById('feedback').innerText="✅ Correct";
}else{
document.getElementById('feedback').innerText="❌ Faux ("+rep+")";
}

document.getElementById('score').innerText="Score : "+score;
newQuestion();
}

newQuestion();

// JEU RAPIDE
let js=0;
let ja,jb,jr;

function newJeu(){
ja=Math.floor(Math.random()*20);
jb=Math.floor(Math.random()*20);
jr=ja+jb;

document.getElementById('jeuQuestion').innerText=`${ja} + ${jb}`;
}

function jeuCheck(){
let r=parseInt(document.getElementById('jeuRep').value);

if(r===jr){js++;}

document.getElementById('jeuScore').innerText="Score : "+js;
document.getElementById('jeuRep').value="";
newJeu();
}

newJeu();

</script>

</body>
</html>
